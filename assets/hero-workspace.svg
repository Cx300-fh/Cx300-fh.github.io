<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Warm coding workspace</title>
  <desc id="desc">A Claude Code inspired personal homepage hero scene with terminals and project panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7F0E4"/>
      <stop offset="0.42" stop-color="#EFE4D4"/>
      <stop offset="1" stop-color="#D8E6DF"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="585" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#222522"/>
      <stop offset="0.5" stop-color="#151614"/>
      <stop offset="1" stop-color="#202B2B"/>
    </linearGradient>
    <linearGradient id="screen" x1="444" y1="178" x2="1480" y2="790" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#20201D"/>
      <stop offset="1" stop-color="#0C0D0C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F1C27B"/>
      <stop offset="1" stop-color="#C76F35"/>
    </linearGradient>
    <filter id="shadow" x="296" y="110" width="1348" height="828" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="40" flood-color="#1B1A17" flood-opacity="0.32"/>
    </filter>
    <pattern id="dots" width="42" height="42" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="#A5B6AE" opacity="0.32"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#dots)" opacity="0.52"/>
  <path d="M0 678C272 604 422 632 624 682C826 732 963 806 1217 742C1471 678 1636 594 1920 656V1080H0V678Z" fill="url(#desk)"/>

  <g opacity="0.36">
    <circle cx="228" cy="226" r="116" fill="#7FB7A6"/>
    <circle cx="1634" cy="254" r="142" fill="#8EA0C8"/>
    <circle cx="1606" cy="768" r="96" fill="#D98E59"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="356" y="160" width="1208" height="716" rx="34" fill="#111210"/>
    <rect x="382" y="188" width="1156" height="626" rx="24" fill="url(#screen)" stroke="#4A463B" stroke-width="2"/>
    <rect x="382" y="188" width="1156" height="70" rx="24" fill="#25231F"/>
    <path d="M382 228C382 206 400 188 422 188H1498C1520 188 1538 206 1538 228V258H382V228Z" fill="#25231F"/>
    <circle cx="430" cy="223" r="10" fill="#E36E5F"/>
    <circle cx="466" cy="223" r="10" fill="#E3B35D"/>
    <circle cx="502" cy="223" r="10" fill="#78B284"/>

    <rect x="440" y="304" width="466" height="414" rx="18" fill="#171816" stroke="#37342D"/>
    <rect x="956" y="304" width="518" height="184" rx="18" fill="#171816" stroke="#37342D"/>
    <rect x="956" y="526" width="518" height="192" rx="18" fill="#171816" stroke="#37342D"/>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
      <text x="450" y="230" fill="#988E80" font-size="22">Cx300-fh / workspace</text>
      <text x="482" y="364" fill="#C76F35" font-size="24">$</text>
      <text x="518" y="364" fill="#F6EFE2" font-size="24">build profile --with care</text>
      <rect x="518" y="388" width="248" height="4" rx="2" fill="url(#accent)"/>
      <text x="482" y="454" fill="#F6EFE2" font-size="66" font-weight="700">Cx300-fh</text>
      <text x="486" y="508" fill="#D8CBB8" font-size="28">AI-native builder</text>
      <text x="486" y="558" fill="#8FA69E" font-size="22">idea -> prompt -> patch -> ship</text>
      <text x="486" y="642" fill="#7A7369" font-size="20">main.ts  README.md  projects.json</text>

      <text x="998" y="360" fill="#F6EFE2" font-size="26">Now</text>
      <text x="998" y="410" fill="#D8CBB8" font-size="20">Learning in public</text>
      <text x="998" y="444" fill="#C76F35" font-size="20">Shipping small tools</text>

      <text x="998" y="584" fill="#F6EFE2" font-size="26">Signals</text>
      <text x="998" y="634" fill="#7FB7A6" font-size="20">frontend</text>
      <text x="1128" y="634" fill="#D98E59" font-size="20">automation</text>
      <text x="1298" y="634" fill="#8EA0C8" font-size="20">AI workflow</text>
    </g>
  </g>

  <path d="M662 876H1258L1302 1000H618L662 876Z" fill="#0B0C0B"/>
  <rect x="712" y="1004" width="496" height="24" rx="12" fill="#111210"/>
</svg>

